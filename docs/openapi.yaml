openapi: 3.1.0
info:
  title: Bindu Agent API
  version: "1.0.0"
  summary: A2A-protocol agent over JSON-RPC 2.0, with DID identity, OAuth2 authentication, and optional x402 payments.
  description: |
    # Bindu Agent — canonical OpenAPI

    This specification describes the HTTP surface every Bindu-built agent
    exposes. Agents built with [`bindufy()`](https://docs.getbindu.com/bindu/reference/bindufy)
    answer to these endpoints out of the box; no per-agent route code is
    written by the handler author.

    The spec is **generic** — it intentionally avoids any one domain
    (stock analysis, weather, etc.). Use it as the source of truth for
    clients calling *any* Bindu agent; domain-specific overlays belong
    in a per-agent OpenAPI that `$ref`s the schemas here.

    ---

    ## Mental model: one endpoint, many methods

    Every call goes to `POST /`. The `jsonrpc.method` field in the body
    selects what you want to do:

    | Method | What you're doing |
    |---|---|
    | `message/send` | Kick off work. Returns a `Task` object. |
    | `tasks/get` | Poll that task by id until it terminates. |
    | `tasks/list` | See the caller's task history. |
    | `tasks/cancel` | Stop a running task. |
    | `tasks/feedback` | Rate a completed task. |
    | `contexts/list` | See active conversation contexts. |
    | `contexts/clear` | Reset a context. |
    | `message/stream` | *(Experimental)* SSE stream of task deltas. |

    Auxiliary endpoints (skills, DID resolution, negotiation, payment)
    use conventional REST paths — see the *Paths* section.

    ---

    ## Task-first architecture

    Every interaction creates a trackable **Task** with a unique
    `id`. This matters even for "quick" agents because:

    - **Tasks are pollable** — long-running work (5–10 minutes of
      multi-agent analysis, say) doesn't block your HTTP connection.
    - **Tasks chain** — pass `referenceTaskIds` to build Task B on
      top of Task A's results. The server orchestrates the ordering
      automatically.
    - **Tasks share context** — pass the same `contextId` to keep
      conversation history across calls.
    - **Tasks have states** — you always know where the work is.

    ### State machine

    Non-terminal (work still possible):
    - `submitted` — queued, not yet picked up
    - `working` — agent is actively processing
    - `input-required` — paused, waiting for user clarification
    - `auth-required` — paused, waiting for an auth flow

    Terminal (task frozen, cannot be resumed):
    - `completed` — success, artifacts available
    - `failed` — processing error (check `status.message`)
    - `canceled` — user terminated via `tasks/cancel`
    - `rejected` — invalid input / agent declined (check `status.message`)

    **Terminal tasks are immutable.** To refine a completed answer,
    submit a new `message/send` with `referenceTaskIds: [<old-task-id>]`
    — the new task can read the old task's artifacts and build from
    there.

    ---

    ## Authentication

    ### Layer 1 — bearer token (required on writable methods)

    ```
    Authorization: Bearer <hydra-issued access token>
    ```

    The server introspects the token against Ory Hydra. Scopes map to
    methods:

    | Scope | Unlocks |
    |---|---|
    | `agent:read` | `tasks/get`, `tasks/list`, `contexts/list`, all `GET`s |
    | `agent:write` | `message/send`, `tasks/cancel`, `tasks/feedback`, `contexts/clear` |

    `agent:execute` (legacy) implies both.

    ### Layer 2 — DID request signing (optional, recommended for agent-to-agent)

    When you're an agent calling another agent, sign each request:

    | Header | Value |
    |---|---|
    | `X-DID` | Your full DID string |
    | `X-DID-Timestamp` | Unix seconds (must be within ±300s of server clock) |
    | `X-DID-Signature` | base58(Ed25519 signature over the payload) |

    The payload is Python's `json.dumps({"body":body,"did":did,"timestamp":ts}, sort_keys=True)`
    — note default separators include spaces after `:` and `,`. The
    body is the exact UTF-8 bytes you send — any re-serialization by
    middleware breaks the signature and the server responds
    `reason: "crypto_mismatch"`.

    Signature verification is:
    1. Gate 1 — introspect bearer → `client_id` must start with `did:`
    2. Gate 2 — `X-DID` header must equal the token's `client_id`
    3. Gate 3 — Hydra metadata for that client must have `public_key` set
    4. Gate 4 — Ed25519 verify + timestamp within window

    See [`docs/DID.md`](./DID.md) for the full walk-through and common
    failure modes.

    ### Layer 3 — x402 payment (optional, on paid endpoints only)

    Send a base64-encoded x402 payload as `X-PAYMENT` on
    `message/send`, or obtain a session-based grant via
    `POST /api/start-payment-session` first.

    ---

    ## Error catalog

    Errors come back in the JSON-RPC envelope as
    `{ jsonrpc, id, error: { code, message, data? } }`.

    ### Standard JSON-RPC (per RFC)

    | Code | Name | HTTP | When |
    |---|---|---|---|
    | `-32700` | Parse error | 400 | Body isn't valid JSON |
    | `-32600` | Invalid Request | 400 | Body is JSON but not a valid JSON-RPC request |
    | `-32601` | Method not found | 404 | `method` isn't one this agent supports |
    | `-32602` | Invalid params | 400 | `params` fails schema validation |
    | `-32603` | Internal error | 500 | Server-side bug; file a GH issue |

    ### A2A protocol

    | Code | Name | HTTP | When |
    |---|---|---|---|
    | `-32001` | TaskNotFound | 404 | `taskId` doesn't exist or isn't yours |
    | `-32002` | TaskNotCancelable | 400 | Task already in a terminal state |
    | `-32003` | PushNotificationNotSupported | 400 | Agent doesn't do push |
    | `-32004` | UnsupportedOperation | 400 | e.g. `message/stream` on a non-streaming agent |
    | `-32005` | ContentTypeNotSupported | 400 | `acceptedOutputModes` doesn't overlap agent capabilities |
    | `-32006` | InvalidAgentResponse | 500 | Agent produced a malformed result (bug in agent) |
    | `-32007` | AuthenticatedExtendedCardNotConfigured | 400 | Extended card requested but agent didn't publish one |

    ### Bindu extensions

    | Code | Name | HTTP | When |
    |---|---|---|---|
    | `-32008` | TaskImmutable | 400 | Attempted to modify a terminal task |
    | `-32009` | AuthenticationRequired | 401 | No bearer token on a protected method |
    | `-32010` | InvalidToken | 401 | Token introspection returned `active: false` |
    | `-32011` | TokenExpired | 401 | `exp` in the past |
    | `-32012` | InvalidTokenSignature | 403 | X-DID-Signature failed verification |
    | `-32013` | InsufficientPermissions | 403 | Token valid but scope doesn't cover this method |
    | `-32020` | ContextNotFound | 404 | `contextId` doesn't exist |
    | `-32021` | ContextNotCancelable | 400 | Tried to clear a context still in use |
    | `-32030` | SkillNotFound | 404 | `skillId` in the URL doesn't exist |

    ---

    ## Versioning

    - Path shape is stable. New methods may be added under `POST /`
      but existing methods don't break compatibility.
    - Schema fields may be added (backward-compatible). Renames or
      removals go through a deprecation window announced in the
      [changelog](https://docs.getbindu.com/changelog).
    - Error code numeric values are permanent once assigned.

  contact:
    name: Bindu
    url: https://docs.getbindu.com
    email: support@getbindu.com
  license:
    name: Apache-2.0
